name: Build and Release

on:
  push:
    tags:
      - 'v*' # v로 시작하는 태그 푸시 시 실행 (예: v1.1.0)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: app

      - name: Create release AppConfig inputs
        shell: pwsh
        env:
          RELEASE_API_URL: ${{ vars.VITE_API_URL }}
          RELEASE_WS_URL: ${{ vars.VITE_WS_URL }}
          RELEASE_BACKEND_ENVIRONMENT: ${{ vars.VITE_BACKEND_ENVIRONMENT }}
          RELEASE_RELAY_ENVIRONMENT: ${{ vars.VITE_RELAY_ENVIRONMENT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_API_URL)) {
            throw "Repository variable VITE_API_URL is required for Electron release builds."
          }

          "VITE_API_URL=$env:RELEASE_API_URL" | Set-Content -Path app/.env -Encoding utf8

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_WS_URL)) {
            "VITE_WS_URL=$env:RELEASE_WS_URL" | Add-Content -Path app/.env -Encoding utf8
          }

          $environment = if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_BACKEND_ENVIRONMENT)) {
            $env:RELEASE_BACKEND_ENVIRONMENT
          } elseif (-not [string]::IsNullOrWhiteSpace($env:RELEASE_RELAY_ENVIRONMENT)) {
            $env:RELEASE_RELAY_ENVIRONMENT
          } else {
            "production"
          }
          "VITE_BACKEND_ENVIRONMENT=$environment" | Add-Content -Path app/.env -Encoding utf8

      - name: Build Electron app
        run: npm run electron:build
        working-directory: app
        env:
          CI: true
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 30

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            app/dist/*.exe
            app/dist/latest.yml
            app/dist/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./dist-windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./dist-windows/*.exe
            ./dist-windows/latest.yml
            ./dist-windows/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
